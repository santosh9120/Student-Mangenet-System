<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notice Management</title>

<link rel="stylesheet" href="css/admin-dashboard.css">
<link rel="stylesheet" href="css/notices.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

<i class="fas fa-user-shield"></i>

<h2>SMS Admin</h2>

</div>

<ul>

<li><a href="admin-dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a></li>

<li><a href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li>

<li><a href="teachers.html"><i class="fas fa-chalkboard-user"></i> Teachers</a></li>

<li><a href="departments.html"><i class="fas fa-building"></i> Departments</a></li>

<li><a href="courses.html"><i class="fas fa-book-open"></i> Courses</a></li>

<li><a href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a></li>

<li><a href="results.html"><i class="fas fa-chart-line"></i> Results</a></li>

<li class="active">

<a href="notices.html">

<i class="fas fa-bullhorn"></i>

Notices

</a>

</li>

<li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>

<li>

<a href="admin-login.html" id="logout">

<i class="fas fa-right-from-bracket"></i>

Logout

</a>

</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<header class="topbar">

<button id="menuBtn">

<i class="fas fa-bars"></i>

</button>

<h2>Notice Management</h2>

<div class="top-right">

<input
type="text"
id="search"
placeholder="Search Notice">

<button onclick="openNoticeModal()">

<i class="fas fa-plus"></i>

</button>

<div id="clock"></div>

</div>

</header>

<section class="table-section">

<div class="table-header">

<h2>College Notices</h2>

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Title</th>

<th>Description</th>

<th>Date</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="noticeTable">

</tbody>

</table>

</section>

<!-- Modal -->

<div id="noticeModal">

<div class="modal-content">

<h2 id="modalTitle">

Add Notice

</h2>

<form id="noticeForm">

<input
type="hidden"
id="noticeId">

<input
type="text"
id="title"
placeholder="Notice Title"
required>

<textarea
id="description"
placeholder="Notice Description"
required></textarea>

<input
type="date"
id="noticeDate"
required>

<div class="modal-footer">

<button
type="button"
class="btn btn-danger"
onclick="closeModal()">

Cancel

</button>

<button
type="submit"
class="btn btn-success">

Save Notice

</button>

</div>

</form>

</div>

</div>

</main>

</div>

<script src="/js/notices.js"></script>
<script>

if(localStorage.getItem("theme") === "dark"){

    document.body.classList.add("dark-mode");

}

</script>

</body>

</html>
