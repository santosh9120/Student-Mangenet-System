<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Student | Student Management System</title>

    <link rel="stylesheet" href="css/edit-student.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">

            <i class="fas fa-user-shield"></i>

            <h2>Admin</h2>

        </div>

        <ul>

            <li>
                <a href="admin-dashboard.html">
                    <i class="fas fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="add-student.html">
                    <i class="fas fa-user-plus"></i>
                    Add Student
                </a>
            </li>

            <li class="active">
                <a href="view-students.html">
                    <i class="fas fa-users"></i>
                    Students
                </a>
            </li>

            <li>
                <a href="courses.html">
                    <i class="fas fa-book"></i>
                    Courses
                </a>
            </li>

            <li>
                <a href="departments.html">
                    <i class="fas fa-building"></i>
                    Departments
                </a>
            </li>

            <li>
                <a href="reports.html">
                    <i class="fas fa-chart-line"></i>
                    Reports
                </a>
            </li>

            <li>
                <a href="index.html">
                    <i class="fas fa-right-from-bracket"></i>
                    Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="topbar">

            <h1>Edit Student</h1>

        </div>

        <div class="form-container">

            <form id="editStudentForm">

                <div class="row">

                    <div class="input-group">

                        <label>Student Name</label>

                        <input
                        type="text"
                        id="name"
                        value="Santosh"
                        required>

                    </div>

                    <div class="input-group">

                        <label>Roll Number</label>

                        <input
                        type="text"
                        id="roll"
                        value="CE101"
                        required>

                    </div>

                </div>

                <div class="row">

                    <div class="input-group">

                        <label>Email</label>

                        <input
                        type="email"
                        id="email"
                        value="santosh@gmail.com"
                        required>

                    </div>

                    <div class="input-group">

                        <label>Mobile</label>

                        <input
                        type="text"
                        id="mobile"
                        value="9876543210"
                        required>

                    </div>

                </div>

                <div class="row">

                    <div class="input-group">

                        <label>Department</label>

                        <select id="department">

                            <option selected>Computer Engineering</option>
                            <option>Information Technology</option>
                            <option>Mechanical Engineering</option>
                            <option>Civil Engineering</option>
                            <option>Electrical Engineering</option>

                        </select>

                    </div>

                    <div class="input-group">

                        <label>Year</label>

                        <select id="year">

                            <option>First Year</option>
                            <option>Second Year</option>
                            <option selected>Third Year</option>
                            <option>Final Year</option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="input-group">

                        <label>Student Photo</label>

                        <input type="file">

                    </div>

                </div>

                <div class="buttons">

                    <button type="submit" class="save-btn">

                        <i class="fas fa-floppy-disk"></i>

                        Update Student

                    </button>

                    <button type="reset" class="cancel-btn">

                        <i class="fas fa-xmark"></i>

                        Cancel

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="/js/edit-student.js"></script>

</body>

</html>
