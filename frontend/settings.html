<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | Student Management System</title>

<link rel="stylesheet" href="css/admin-dashboard.css">
<link rel="stylesheet" href="css/settings.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

<i class="fas fa-user-shield"></i>

<h2>SMS Admin</h2>

</div>

<ul>

<li><a href="admin-dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a></li>

<li><a href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li>

<li><a href="teachers.html"><i class="fas fa-chalkboard-user"></i> Teachers</a></li>

<li><a href="departments.html"><i class="fas fa-building"></i> Departments</a></li>

<li><a href="courses.html"><i class="fas fa-book-open"></i> Courses</a></li>

<li><a href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a></li>

<li><a href="results.html"><i class="fas fa-chart-line"></i> Results</a></li>

<li><a href="notices.html"><i class="fas fa-bullhorn"></i> Notices</a></li>

<li class="active">

<a href="settings.html">

<i class="fas fa-gear"></i>

Settings

</a>

</li>

<li>

<a href="#" id="logout">

<i class="fas fa-right-from-bracket"></i>

Logout

</a>

</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<header class="topbar">

<button id="menuBtn">

<i class="fas fa-bars"></i>

</button>

<h2>System Settings</h2>

<div id="clock"></div>

</header>

<div class="settings-container">

<form id="settingsForm">

<div class="card">

<h3><i class="fas fa-school"></i> Institute Information</h3>

<input
type="text"
id="collegeName"
placeholder="College Name">

<input
type="text"
id="collegeAddress"
placeholder="College Address">

<input
type="email"
id="collegeEmail"
placeholder="College Email">

<input
type="text"
id="collegePhone"
placeholder="College Phone">

</div>

<div class="card">

<h3><i class="fas fa-user-shield"></i> Admin Information</h3>

<input
type="text"
id="adminName"
placeholder="Admin Name">

<input
type="email"
id="adminEmail"
placeholder="Admin Email">

<input
type="password"
id="adminPassword"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

</div>

<div class="card">

<h3><i class="fas fa-sliders"></i> Preferences</h3>

<label>

<input
type="checkbox"
id="darkMode">

Enable Dark Mode

</label>

<label>

<input
type="checkbox"
id="notifications"
checked>

Enable Notifications

</label>

<label>

<input
type="checkbox"
id="emailAlerts"
checked>

Email Alerts

</label>

</div>

<div class="save-section">

<button
type="submit"
class="save-btn">

<i class="fas fa-floppy-disk"></i>

Save Settings

</button>

</div>

</form>

</div>

</main>

</div>

<script src="/js/settings.js"></script>
<script>

if(localStorage.getItem("theme") === "dark"){

    document.body.classList.add("dark-mode");

}

</script>

</body>

</html>
